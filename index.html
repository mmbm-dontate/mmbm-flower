<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Flower Offering</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🌸 Virtual Flower Offering 🌸</h1>

    <p>
        Offer a flower at the Divine Lotus Feet of our beloved deity.
    </p>

    <div id="deityContainer">

        <img
            id="deity"
            src="images/Chaitanya-Maha-Prabhu.jpg"
            alt="MMBM Deity">

        <div id="flowerBed"></div>

    </div>

    <br>

    <button id="offerBtn">
        🌺 Offer a Flower
    </button>

    <h2 id="counter">
        Flowers Offered : 0
    </h2>

    <div id="message"></div>

</div>

<audio id="bellSound" preload="auto">
    <source src="audio/temple-bell.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
</audio>
    
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>

</body>
</html>
